name: Latest

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-release
  cancel-in-progress: false

env:
  VERSION: 1.0.${{ github.run_number }}

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build universal app
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" Info.plist
          ./build.sh --arch arm64 --arch x86_64
          codesign --force --deep --sign - Leafblower.app
          codesign --verify --deep --strict Leafblower.app
          lipo -archs Leafblower.app/Contents/MacOS/Leafblower

      - name: Package
        id: package
        run: |
          archive="Leafblower-${VERSION}-macOS.zip"
          checksum="${archive}.sha256"
          ditto -c -k --sequesterRsrc --keepParent Leafblower.app "$archive"
          shasum -a 256 "$archive" > "$checksum"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          tag="v${VERSION}"
          title="Latest (${tag})"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$ARCHIVE" "$CHECKSUM" --clobber
            gh release edit "$tag" --title "$title" --latest
          else
            gh release create "$tag" "$ARCHIVE" "$CHECKSUM" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --generate-notes \
              --latest
          fi
